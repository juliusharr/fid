<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Black Goose Bistro | Pizza-on-Demand</title>
</head>

<body>

<h1>Black Goose Bistro | Pizza-on-Demand</h1>

<p>Our 12" wood-fired pizzas are available for delivery. Build your custom pizza and we'll deliver it within an hour.</p>

<form action="http://www.blackgoosebistro.com/pizza.php" method="post">

<!-- CUSTOMER INFO -->
<fieldset>
<legend>Your Information</legend>

<label for="name">Name:</label>
<input type="text" id="name" name="customername"><br><br>

<label for="address">Address:</label>
<input type="text" id="address" name="address"><br><br>

<label for="phone">Telephone Number:</label>
<input type="text" id="phone" name="telephone"><br><br>

<label for="email">Email:</label>
<input type="text" id="email" name="email"><br><br>

<label for="instructions">Delivery Instructions:</label><br>
<textarea id="instructions" name="instructions" rows="4" cols="60" maxlength="400" placeholder="No more than 400 characters long"></textarea>

</fieldset>

<br>

<!-- PIZZA OPTIONS -->
<fieldset>
<legend>Design Your Dream Pizza</legend>

<!-- CRUST -->
<fieldset>
<legend>Crust (Choose one)</legend>

<label><input type="radio" name="crust" value="white"> Classic white</label><br>
<label><input type="radio" name="crust" value="multigrain"> Multigrain</label><br>
<label><input type="radio" name="crust" value="cheese"> Cheese-stuffed crust</label><br>
<label><input type="radio" name="crust" value="glutenfree"> Gluten-free</label>

</fieldset>

<br>

<!-- TOPPINGS -->
<fieldset>
<legend>Toppings (Choose as many as you want)</legend>

<label><input type="checkbox" name="toppings[]" value="redsauce" checked> Red sauce</label><br>
<label><input type="checkbox" name="toppings[]" value="whitesauce"> White sauce</label><br>
<label><input type="checkbox" name="toppings[]" value="mozzarella"> Mozzarella cheese</label><br>
<label><input type="checkbox" name="toppings[]" value="pepperoni"> Pepperoni</label><br>
<label><input type="checkbox" name="toppings[]" value="mushrooms"> Mushrooms</label><br>
<label><input type="checkbox" name="toppings[]" value="peppers"> Peppers</label><br>
<label><input type="checkbox" name="toppings[]" value="anchovies"> Anchovies</label>

</fieldset>

<br>

<!-- NUMBER OF PIZZAS -->
<label for="pizzas">Number of pizzas:</label>
<select name="pizzas" id="pizzas">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
</select>

</fieldset>

<br>

<!-- 🔥 FIXED SIZE IMAGE BUTTON -->
<input type="image" src="images/IMG_0811.png" alt="Order Pizza" width="200">

</form>

</body>
</html>

</body>
</html>
