<head>
<meta charset="UTF-8">
<title>Black Goose Bistro • Summer Menu</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BACKGROUND */
body {
    font-family: Georgia, serif !important;
    background-color: #c6cf9a !important;
    background-image: url("images/bullseye.png") !important;
    background-position: top center !important;
    background-attachment: fixed !important;
}

/* KILL ANY WHITE BOX ANYWHERE */
header, header *, div, div * {
    background: transparent !important;
    background-color: transparent !important;
    background-image: none !important;
    box-shadow: none !important;
    border: none !important;
}

/* HEADER */
header {
    width: 800px;
    margin: 40px auto;
    text-align: center;
}

/* TITLE */
h1 {
    color: purple;
    font-size: 32px;
}

/* NAV */
nav a {
    display: block;
    color: purple;
    text-decoration: none;
}

/* SECTIONS */
section {
    width: 800px;
    margin: 0 auto;
}

/* SECTION HEADERS */
h2 {
    text-align: center;
    color: #d2691e;
    letter-spacing: 4px;
    margin-top: 40px;
}

/* TAGLINE */
.tagline {
    text-align: center;
    font-style: italic;
}
</style>

</head>
